<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Studio Cartelli">
    <title>Studio Cartelli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne+Tactile&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            background-color: white;
            padding: 80px;
        }

        main {
            background-color: #005BEC;
            height: 100%;
            display: flex;
            align-items: center;
            padding-left: 80px;
            border-radius: 4px;
        }

        h1 {
            font-family: 'Syne Tactile', sans-serif;
            color: white;
            font-size: clamp(2rem, 8vw, 5rem);
        }

        @media (max-width: 768px) {
            body {
                padding: 40px;
            }
            main {
                padding-left: 40px;
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>studio cartelli</h1>
    </main>
</body>
</html>
