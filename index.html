<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Studio Cartelli — Enterprise-grade MVP design for technical founders. Fixed-scope design sprints, 2–4 weeks.">
  <title>Studio Cartelli</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne+Tactile&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --blue: #005BEC;
      --text: #1a1a1a;
      --muted: #555;
      --light: #999;
      --border: #e8e8e8;
      --pad: 80px;
      --nav-h: 72px;
    }

    html, body { height: 100%; }

    body {
      background: white;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: white;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: var(--nav-h);
      padding: 0 var(--pad);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne Tactile', sans-serif;
      font-size: 1.25rem;
      color: var(--blue);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
    }

    .nav-links a.active { color: var(--text); }

    main {
      background: var(--blue);
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 var(--pad);
      border-radius: 4px;
      margin: 0 var(--pad) var(--pad);
    }

    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      gap: 48px;
    }

    .hero-left { flex: 1; }

    h1 {
      font-size: clamp(1.75rem, 4vw, 2.5rem);
      font-weight: 600;
      color: white;
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    .value-prop {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.75);
      line-height: 1.5;
      margin-top: 12px;
    }

    .cta-row {
      display: flex;
      gap: 12px;
      margin-top: 28px;
    }

    .btn-primary {
      background: white;
      color: var(--blue);
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn-primary:hover { opacity: 0.88; }

    .btn-secondary {
      border: 1px solid rgba(255, 255, 255, 0.5);
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 12px 20px;
      border-radius: 4px;
      text-decoration: none;
      transition: opacity 0.15s;
    }

    .btn-secondary:hover { opacity: 0.75; }

    .hero-right {
      width: 180px;
      flex-shrink: 0;
      border-left: 1px solid rgba(255, 255, 255, 0.2);
      padding-left: 28px;
    }

    .status-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 6px;
    }

    .status-value {
      font-size: 0.9375rem;
      font-weight: 600;
      color: white;
      line-height: 1.3;
    }

    .services-block { margin-top: 20px; }

    .services-value {
      font-size: 0.875rem;
      color: rgba(255, 255, 255, 0.8);
      line-height: 1.6;
    }

    @media (max-width: 860px) {
      :root { --pad: 24px; }
      nav { padding: 0 24px; }
      .nav-links { gap: 20px; }
      main { margin: 0 24px 24px; padding: var(--pad); }
      .hero { flex-direction: column; gap: 24px; align-items: flex-start; }
      .hero-right {
        width: 100%;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.2);
        padding-left: 0;
        padding-top: 24px;
        display: flex;
        gap: 32px;
      }
      .services-block { margin-top: 0; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">studio cartelli</a>
    <ul class="nav-links">
      <li><a href="projects.html">Projects</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>
    <div class="hero">
      <div class="hero-left">
        <h1>Enterprise-grade MVP design for technical founders.</h1>
        <p class="value-prop">Fixed-scope sprints, 2–4 weeks. You work directly with Patrick, not a rotating team.</p>
        <div class="cta-row">
          <a href="projects.html" class="btn-primary">View Projects</a>
          <a href="mailto:ciao@studiocartelli.com" class="btn-secondary">Get in Touch</a>
        </div>
      </div>
      <div class="hero-right">
        <div>
          <div class="status-label">Availability</div>
          <div class="status-value">Taking select projects</div>
        </div>
        <div class="services-block">
          <div class="status-label">Services</div>
          <div class="services-value">Design sprints<br>2–4 weeks<br>$3K–$15K</div>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
